name: ci

# Smoke test: the tooling byte-compiles and the golden test runs.
# NOTE: the golden test's reference fixture (AnKing card text) is copyright-private and gitignored,
# so on CI it SKIPS — this catches syntax/import breakage, not linter drift. Run the golden test
# LOCALLY (with the fixture present) to validate calibration against the reference deck.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Byte-compile the tooling
        run: python -m py_compile classes/ISF/*.py
      - name: Golden test (skips without the private fixture)
        run: python -m unittest tests.test_reference_deck
